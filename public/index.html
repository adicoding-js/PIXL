<!DOCTYPE html>
<html>
<head>
    <title>PIXL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-classic"> <div id="app">
        <div id="window" class="outset">
            <div id="titlebar">
                <span class="winIcon">'icon here'</span>
                <span class="winTitle">PIXL</span>
                <div class="win-buttons">
                    <button class="btn-min">-</button>
                    <button class="btnmax">🗖</button>
                    <button class="btn-close">X</button>
                    <div id="minimap-window" class="outset">
                <div class="minimap-titlebar">Minimap</div>
                <canvas id="minimapCanvas" width="100" height="100" class="inset"></canvas>
            </div>
                </div>
            </div> 
            
            <div id="menubar">
                <div class="menu-item" id="menuFile">File
                    <div class="dropdown outset">
                        <div class="dropdown-item" id="btnScreenshot">Save Canvas...</div>
                        <div class="menu-separator"></div>
                        <div class="dropdown-item" id="btnExit" onclick="alert('It is inescapable.')">Exit</div>
                    </div>
                </div>
                <div class="menu-item" id="menuEdit">Edit
                    <div class="dropdown outset">
                        <div class="dropdown-item" style="color: gray;">Undo (WIP)</div>
                    </div>
                </div>
                <div class="menu-item" id="menuView">View
                    <div class="dropdown outset">
                        <div class="dropdown-item" id="btnToggleGrid">Show Grid <span id="gridCheck">✓</span></div>
                    </div>
                </div>
                <div class="menu-item" id="menuHelp">Help
                    <div class="dropdown outset">
                        <div class="dropdown-item" id="btnAbout">About PIXL...</div>
                    </div>
                </div>
            </div>

            <div id="aboutDialog" class="outset" style="display: none; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: #C0C0C0; width: 250px; z-index: 2000; padding: 2px;">
    <div id="titlebar">
        <span class="winTitle">About</span>
        <div class="win-buttons">
            <button id="closeAbout">X</button>
        </div>
    </div>
    <div style="padding: 20px; text-align: center; color: black; display: flex; flex-direction: column; gap: 10px;">
        <h2 style="margin: 0;">PIXL</h2>
        <p style="margin: 0; font-size: 12px;">Version 1.0 (Win98 Edition)<br>A retro collaborative canvas.</p>
        <button class="outset" id="okAbout" style="width: 80px; margin: 10px auto 0; padding: 4px; cursor: pointer;">OK</button>
    </div>
</div> <div id="usernameDialog" class="outset" style="position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: #C0C0C0; width: 280px; z-index: 3000; padding: 2px;">
    <div class="modal-titlebar" style="background: linear-gradient(90deg, #000080, #1084D0); color: white; display: flex; align-items: center; height: 22px; padding: 2px 4px; font-weight: bold;">
        <span class="winTitle" style="font-size: 12px;">Enter Username</span>
        <div class="win-buttons" style="margin-left: auto;">
            <button id="closeUsername" style="width: 16px; height: 14px; font-size: 10px; background: #C0C0C0; border: 1px solid white; border-right-color: #808080; border-bottom-color: #808080; display: flex; align-items: center; justify-content: center;">X</button>
        </div>
    </div>
    <div style="padding: 20px; text-align: center; color: black; display: flex; flex-direction: column; gap: 10px;">
        <p style="margin: 0; font-size: 12px;">Identify yourself on the canvas:</p>
        <input type="text" id="usernameInput" class="inset" style="padding: 4px; width: 80%; margin: 0 auto; outline: none; font-family: 'MS Sans Serif', Arial, sans-serif;" value="Player">
        <button class="outset" id="okUsername" style="width: 80px; margin: 10px auto 0; padding: 4px; cursor: pointer;">OK</button>
    </div>
</div>
            <div id="toolbar">
                <select id="mapSelect" class="inset" style="margin-left: 4px; margin-right: auto; padding: 2px;">
                    <option value="main">Main Canvas</option>
                    <option value="dark">Dark Canvas</option>
                    <option value="retro">Retro Canvas</option>
                </select>
            </div>

            <div id="content" class="inset">
                <canvas id="mainCanvas"></canvas>
                <div id="scanlines"></div>
            </div>

            <div id="statusbar">
                <span class="status-tool">Tool: Pencil</span>
                <div class="status-colordot" style="width: 12px; height: 12px; background: #000000; display: inline-block;"></div>
                <span class="status-coords">X: 0 Y: 0</span>
                <span class="status-users">Players Online:--</span>
                <span class="status-conn" style="display: inline-block; width: 8px; height: 12px; border-radius: 50%; background: #AA0000;"></span> 
                <span class="status-clock">00:00</span>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
