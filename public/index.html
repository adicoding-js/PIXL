<!DOCTYPE html>
<html>
<head>
    <title>PIXL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-classic"> <div id="app">
        <div id="window" class="outset">
            <div id="titlebar">
                <span class="winIcon">'icon here'</span>
                <span class="winTitle">PIXL</span>
                <div class="win-buttons">
                    <button class="btn-min">-</button>
                    <button class="btnmax">🗖</button>
                    <button class="btn-close">X</button>
                </div>
            </div> <div id="menubar">
                <span>File</span><span>Edit</span><span>View</span><span>Help</span>
            </div>

            <div id="toolbar">
                <select id="mapSelect" class="inset" style="margin-left: 4px; margin-right: auto; padding: 2px;">
                    <option value="main">Main Canvas</option>
                    <option value="dark">Dark Canvas</option>
                    <option value="retro">Retro Canvas</option>
                </select>
            </div>

            <div id="content" class="inset">
                <canvas id="mainCanvas"></canvas>
            </div>

            <div id="statusbar">
                <span class="status-tool">Tool: Pencil</span>
                <div class="status-colordot" style="width: 12px; height: 12px; background: #000000; display: inline-block;"></div>
                <span class="status-coords">X: 0 Y: 0</span>
                <span class="status-users">Players Online:--</span>
                <span class="status-conn" style="display: inline-block; width: 8px; height: 12px; border-radius: 50%; background: #AA0000;"></span> 
                <span class="status-clock">00:00</span>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
